name: Desktop build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "index.html"
      - "manifest.webmanifest"
      - "sw.js"
      - "LICENSE"
      - "NOTICE.md"
      - "DATA_LICENSE.md"
      - "rust-toolchain.toml"
      - "assets/**"
      - "data/ko_quotes.js"
      - "data/ko_coverage.json"
      - "data/LITERATURE_CLOCK_LICENSE.md"
      - "firmware/OFL.txt"
      - "scripts/prepare_desktop.mjs"
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "manifest.webmanifest"
      - "sw.js"
      - "LICENSE"
      - "NOTICE.md"
      - "DATA_LICENSE.md"
      - "rust-toolchain.toml"
      - "assets/**"
      - "data/ko_quotes.js"
      - "data/ko_coverage.json"
      - "data/LITERATURE_CLOCK_LICENSE.md"
      - "firmware/OFL.txt"
      - "scripts/prepare_desktop.mjs"
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: writerclock-windows-unsigned
            bundle: |
              desktop/src-tauri/target/release/bundle/nsis/*.exe
              desktop/src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            artifact: writerclock-macos-unsigned
            bundle: desktop/src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: "1.97.0"
          components: rustfmt, clippy

      - name: Install desktop toolchain
        working-directory: desktop
        run: npm ci

      - name: Generate native icons
        working-directory: desktop
        run: npm run icons

      - name: Prepare offline web bundle
        working-directory: desktop
        run: npm run prepare

      - name: Check Rust formatting
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: Check Rust code
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Build installers
        working-directory: desktop
        run: npm run build

      - name: Upload unsigned installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle }}
          if-no-files-found: error

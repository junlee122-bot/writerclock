name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Test application core
        run: npm test

      - name: Audit quote data
        run: npm run audit:data

      - name: Check static application shell
        run: npm run check:static

      - name: Test Korean time extraction regressions
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate translation curation rules
        run: node scripts/curate_translation_corpus.mjs --dry-run

      - name: Verify the Korean corpus builder is reproducible
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/build_ko_quotes.py --check

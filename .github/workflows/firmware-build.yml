name: Firmware build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/ko_quotes.js"
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"
  push:
    branches: [main]
    paths:
      - "data/ko_quotes.js"
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pinned build tools
        run: python -m pip install platformio==6.1.19 fonttools==4.63.0 pillow==12.3.0

      - name: Regenerate embedded data and icons
        run: |
          python firmware/tools/build_data.py
          python firmware/tools/make_icon.py
          git diff --exit-code -- firmware/data/quotes_min.json firmware/data/glyphs.txt firmware/main/cat_icon.c firmware/main/cat_icon_48.c

      - name: Build pinned font assets
        working-directory: firmware/tools
        run: |
          bash build_fonts.sh
          cp font_ko_28.c font_ko_22.c font_ko_18.c font_ko_44.c font_digits_96.c ../main/
          python embed_quotes.py

      - name: Fetch pinned LVGL
        shell: bash
        run: |
          git init firmware/components/lvgl
          git -C firmware/components/lvgl remote add origin https://github.com/lvgl/lvgl.git
          git -C firmware/components/lvgl fetch --depth 1 origin c016f72d4c125098287be5e83c0f1abed4706ee5
          git -C firmware/components/lvgl checkout --detach FETCH_HEAD
          rm -f firmware/components/lvgl/idf_component.yml

      - name: Compile ESP32-S3 firmware
        run: pio run -d firmware -e rlcd42

      - name: Upload firmware binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: writerclock-esp32-s3-firmware
          path: |
            firmware/.pio/build/rlcd42/firmware.bin
            firmware/.pio/build/rlcd42/firmware.elf
            firmware/.pio/build/rlcd42/bootloader.bin
            firmware/.pio/build/rlcd42/partitions.bin
          if-no-files-found: error
          retention-days: 14

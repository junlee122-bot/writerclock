name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main' && vars.PUBLISH_QUOTE_DATA == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify release inputs
        run: npm run check

      - name: Test Korean time extraction regressions
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate translation curation rules
        run: node scripts/curate_translation_corpus.mjs --dry-run

      - name: Verify generated corpus
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/build_ko_quotes.py --check

      - name: Prepare minimal static site
        shell: bash
        run: |
          mkdir -p dist/data dist/firmware dist/docs
          cp index.html 404.html manifest.webmanifest sw.js robots.txt sitemap.xml dist/
          cp -R assets dist/assets
          cp data/ko_quotes.js data/ko_coverage.json data/LITERATURE_CLOCK_LICENSE.md dist/data/
          cp docs/SOURCE_AUDIT.md dist/docs/
          cp firmware/OFL.txt dist/firmware/
          for file in LICENSE NOTICE.md DATA_LICENSE.md; do
            if [[ -f "$file" ]]; then cp "$file" dist/; fi
          done
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && vars.PUBLISH_QUOTE_DATA == 'approved'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
